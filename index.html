		</div>
	</header>

	<!-- Navigation bar -->

	<nav class="navbar navbar-expand-lg navbar-dark" style="background-color: #d64161;" id="mainpage">

						<a class="nav-link" href="#projects">Projects</a>

		</div>
		<div class="row mt-2 py-2">
			<div class="col-4"></div>
